
x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
  AIRFLOW__WEBSERVER__SECRET_KEY: af5140c55533b13fd9bf3d651eefa14c
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
  AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "false"
  AIRFLOW__WEBSERVER__RBAC: "true"
  AIRFLOW_UID: ${AIRFLOW_UID:-50000}
  # Ensure logs are served correctly on port 8793
  AIRFLOW__LOGGING__LOG_SERVER_PORT: 8793
  _PIP_ADDITIONAL_REQUIREMENTS: "kaggle pandas"
    # Add Spark to PATH inside container
  PATH: "/usr/local/spark/bin:${PATH}"



services:
  postgres:
    image: postgres:16
    container_name: airflow-postgres
    hostname: postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.10.2
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "admin"
      _AIRFLOW_WWW_USER_PASSWORD: "admin"
    entrypoint: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../data:/opt/airflow/data
      - /home/marius/.kaggle:/home/airflow/.kaggle
      - /home/marius/spark-3.5.0-bin-hadoop3:/usr/local/spark
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.10.2
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    ports:
      - "8080:8080"
    command: webserver
    restart: always
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../data:/opt/airflow/data
      - /home/marius/.kaggle:/home/airflow/.kaggle
      - /home/marius/spark-3.5.0-bin-hadoop3:/usr/local/spark
  airflow-scheduler:
    image: apache/airflow:2.10.2
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: scheduler
    restart: always
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../data:/opt/airflow/data
      - /home/marius/.kaggle:/home/airflow/.kaggle
      - /home/marius/spark-3.5.0-bin-hadoop3:/usr/local/spark

volumes:
  postgres_data:
  airflow_logs:
  airflow_dags:
  airflow_plugins: